AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: >
  aws-lambda-nodejs-example

  Sample SAM Template for aws-lambda-nodejs-example

Parameters:
  Environment:
    Type: String
    Default: dev
    AllowedValues:
      - dev
      - prod

Globals:
  Function:
    Timeout: 3
    Runtime: nodejs20.x
    Environment:
      Variables:
        ENVIRONMENT: !Ref Environment

Resources:
  UserApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "UserApiGateway-${Environment}"
      StageName: !Ref Environment

  UtilApiGateway:
    Type: AWS::Serverless::Api
    Properties:
      Name: !Sub "UtilApiGateway-${Environment}"
      StageName: !Ref Environment

  # DynamoDB Table
  UsersTable:
    Type: AWS::Serverless::SimpleTable
    Properties:
      TableName: !Sub "UsersTable-${Environment}"
      PrimaryKey:
        Name: userName
        Type: String

  # POST /users
  AddUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: add-user/
      Handler: app.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Environment:
        Variables:
          TABLE_NAME: !Ref UsersTable
      Events:
        AddUserApi:
          Type: Api
          Properties:
            RestApiId: !Ref UserApiGateway
            Path: /users
            Method: post

  # GET /users/{userName}
  GetUserFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: get-user/
      Handler: app.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Environment:
        Variables:
          TABLE_NAME: !Ref UsersTable
      Events:
        GetUserApi:
          Type: Api
          Properties:
            RestApiId: !Ref UserApiGateway
            Path: /users/{userName}
            Method: get

  # GET /users
  GetAllUsersFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: get-all-users/
      Handler: app.lambdaHandler
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref UsersTable
      Environment:
        Variables:
          TABLE_NAME: !Ref UsersTable
      Events:
        GetAllUsersApi:
          Type: Api
          Properties:
            RestApiId: !Ref UserApiGateway
            Path: /users
            Method: get

  HelloWorldFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: hello-world/
      Handler: app.lambdaHandler
      Architectures:
        - x86_64
      Events:
        HelloWorld:
          Type: Api
          Properties:
            RestApiId: !Ref UtilApiGateway
            Path: /hello
            Method: get

  QuotesScraperFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: quotes-scraper/
      Handler: app.lambdaHandler
      Architectures:
        - x86_64
      Events:
        QuotesScraper:
          Type: Api
          Properties:
            RestApiId: !Ref UtilApiGateway
            Path: /quotes
            Method: get

Outputs:
  HelloWorldApi:
    Description: "API Gateway endpoint URL for Hello World function"
    Value: !Sub "https://${UtilApiGateway}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${Environment}/hello/"

  HelloWorldFunction:
    Description: "Hello World Lambda Function ARN"
    Value: !GetAtt HelloWorldFunction.Arn

  HelloWorldFunctionIamRole:
    Description: "Implicit IAM Role created for Hello World function"
    Value: !GetAtt HelloWorldFunctionRole.Arn

  QuotesScraperApi:
    Description: "API Gateway endpoint URL for Quotes Scraper function"
    Value: !Sub "https://${UtilApiGateway}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${Environment}/quotes/"

  QuotesScraperFunction:
    Description: "Quotes Scraper Function ARN"
    Value: !GetAtt QuotesScraperFunction.Arn

  QuotesScraperFunctionIamRole:
    Description: "Implicit IAM Role created for Quotes Scraper function"
    Value: !GetAtt QuotesScraperFunctionRole.Arn

  AddUserApi:
    Description: "API Gateway endpoint URL for Add User function"
    Value: !Sub "https://${UserApiGateway}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${Environment}/users"

  AddUserFunction:
    Description: "Add User Lambda Function ARN"
    Value: !GetAtt AddUserFunction.Arn

  AddUserFunctionIamRole:
    Description: "Implicit IAM Role created for Add User function"
    Value: !GetAtt AddUserFunctionRole.Arn

  GetUserApi:
    Description: "API Gateway endpoint URL for Get User function"
    Value: !Sub "https://${UserApiGateway}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${Environment}/users/{userName}"

  GetUserFunction:
    Description: "Get User Lambda Function ARN"
    Value: !GetAtt GetUserFunction.Arn

  GetUserFunctionIamRole:
    Description: "Implicit IAM Role created for Get User function"
    Value: !GetAtt GetUserFunctionRole.Arn

  GetAllUsersApi:
    Description: "API Gateway endpoint URL for Get All Users function"
    Value: !Sub "https://${UserApiGateway}.execute-api.${AWS::Region}.${AWS::URLSuffix}/${Environment}/users"

  GetAllUsersFunction:
    Description: "Get All User Lambda Function ARN"
    Value: !GetAtt GetAllUsersFunction.Arn

  GetAllUsersFunctionIamRole:
    Description: "Implicit IAM Role created for Get All User function"
    Value: !GetAtt GetAllUsersFunctionRole.Arn
